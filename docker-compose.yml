services:
  maze-growth-simulator:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      # Servimos SOLO el index.html (no exponemos .git, README, etc.)
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.http.routers.maze-growth-simulator.rule=Host(`simulador.mazefunnels.io`)
      - traefik.http.routers.maze-growth-simulator.entrypoints=websecure
      - traefik.http.routers.maze-growth-simulator.tls.certresolver=letsencrypt
      - traefik.http.services.maze-growth-simulator.loadbalancer.server.port=80

networks:
  traefik-public:
    external: true
